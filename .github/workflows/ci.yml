name: "CI"

on:
  pull_request:

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  nodejs-checks:
    name: Build, Lint, Format with Auto-Commit
    runs-on: ubuntu-latest
    env:
      COMMIT_MESSAGE: "Modified files from CI"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2
          token: ${{ secrets.ACTION_PAT }}

      - name: Check for workflow loop using commit messages
        run: |
          CURRENT_COMMIT_MESSAGE=$(git show -s --pretty=%B HEAD)
          LAST_COMMIT_MESSAGE=$(git show -s --pretty=%B HEAD~1)

          if [ "$CURRENT_COMMIT_MESSAGE" == "$COMMIT_MESSAGE" ] && \
             [ "$LAST_COMMIT_MESSAGE" == "$COMMIT_MESSAGE" ]; then
            echo "It looks like the last two commits are from CI. This indicates a loop."
            exit 1
          fi

      - name: Setup PHP
        uses: "shivammathur/setup-php@v2"
        with:
          php-version: "8.4"
          ini-values: "memory_limit=1G"
          coverage: none
          tools: cs2pr

      - name: Install Composer dependencies
        uses: "ramsey/composer-install@v3"

      - name: Run PHPCS
        run: |
          gh pr diff ${{ github.event.number }} --name-only | xargs find 2> /dev/null \
            | xargs vendor/bin/phpcbf --standard=phpcs.xml
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Install dependencies
        working-directory: web/app/themes/twentytwentyfive
        run: npm install

      - name: "Theme: Build SCSS"
        working-directory: web/app/themes/twentytwentyfive
        run: npm run build

      - name: Push Changes
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ${{ env.COMMIT_MESSAGE }}
          commit_options: "--no-verify"

      - name: Fail workflow if files were modified
        if: steps.auto-commit-action.outputs.changes_detected == 'true'
        run: |
          echo "There were modified files after running CI."
          exit 1

      - name: Run PHPCS
        run: |
          gh pr diff ${{ github.event.number }} --name-only | xargs find 2> /dev/null \
            | xargs vendor/bin/phpcs --standard=phpcs-ci.xml --report=checkstyle | cs2pr
        continue-on-error: true
