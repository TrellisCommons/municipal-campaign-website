name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate PHP and Theme Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          ini-values: memory_limit=1G
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: Run code style check
        run: composer lint

      - name: Run test suite
        run: composer test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/app/themes/twentytwentyfive/package-lock.json

      - name: Install theme dependencies
        working-directory: web/app/themes/twentytwentyfive
        run: npm ci

      - name: Build theme assets
        working-directory: web/app/themes/twentytwentyfive
        run: npm run build

      - name: Ensure CI does not modify tracked files
        run: git diff --exit-code
